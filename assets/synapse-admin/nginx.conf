server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ALB target-group health check. Avoids serving a 200 for any
    # request to '/' that bypassed the OIDC gate (defense in depth
    # is moot here -- the OIDC action sits in front -- but the
    # dedicated path makes log filtering easier).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA routing: serve index.html for any path the bundle owns
    # (React Router handles the rest client-side). Static asset
    # paths (./assets/*.js, *.css, *.woff2, etc.) match $uri
    # first and short-circuit.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
